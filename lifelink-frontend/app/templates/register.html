<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LifeLink — Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root{--crimson:#DC143C;--crimson-l:#FF3358;--bg:#0D0D0D;--surface:#141414;--surface-2:#1E1E1E;--border:rgba(220,20,60,0.18);--text:#F5F5F5;--text-muted:#888;--green:#00E676;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px 20px;position:relative;overflow-x:hidden;}
    .bg-orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;}
    .orb1{width:500px;height:500px;background:var(--crimson);opacity:0.08;top:-150px;right:-100px;}
    .orb2{width:300px;height:300px;background:#2979FF;opacity:0.07;bottom:50px;left:-50px;}
    .auth-container{width:100%;max-width:520px;position:relative;z-index:1;}
    .auth-logo{text-align:center;margin-bottom:28px;}
    .logo-icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--crimson),var(--crimson-l));display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px;box-shadow:0 8px 24px rgba(220,20,60,0.4);animation:heartbeat 1.4s ease-in-out infinite;}
    @keyframes heartbeat{0%,100%{transform:scale(1)}14%{transform:scale(1.15)}28%{transform:scale(1)}42%{transform:scale(1.1)}70%{transform:scale(1)}}
    .logo-name{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;}.logo-name span{color:var(--crimson);}
    .logo-sub{font-size:13px;color:var(--text-muted);margin-top:2px;}
    .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;box-shadow:0 16px 48px rgba(0,0,0,0.5);}
    .auth-card h2{font-family:'Syne',sans-serif;font-size:21px;font-weight:700;margin-bottom:4px;}
    .auth-card .sub{font-size:13px;color:var(--text-muted);margin-bottom:24px;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    @media(max-width:480px){.form-row{grid-template-columns:1fr;}}
    .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
    label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;}
    .input-wrap{position:relative;}
    .input-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px;pointer-events:none;}
    input,select{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:11px 12px 11px 36px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;}
    input:focus,select:focus{border-color:var(--crimson);box-shadow:0 0 0 3px rgba(220,20,60,0.1);}
    input::placeholder{color:var(--text-muted);}
    select option{background:var(--surface-2);}
    .role-selector{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
    .role-option{display:none;}
    .role-label{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 8px;border-radius:10px;border:1px solid var(--border);cursor:pointer;background:var(--surface-2);transition:all 0.2s;font-size:12px;font-weight:500;text-align:center;color:var(--text-muted);}
    .role-label .role-icon{font-size:20px;}
    .role-option:checked + .role-label{border-color:var(--crimson);background:rgba(220,20,60,0.12);color:var(--crimson-l);}
    .btn-submit{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--crimson),var(--crimson-l));color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
    .btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(220,20,60,0.5);}
    .btn-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
    .error-msg{background:rgba(220,20,60,0.12);border:1px solid rgba(220,20,60,0.3);border-radius:8px;padding:11px;font-size:13px;color:#FF5370;margin-bottom:14px;display:none;}
    .auth-switch{text-align:center;font-size:13px;color:var(--text-muted);margin-top:18px;}
    .auth-switch a{color:var(--crimson-l);text-decoration:none;font-weight:600;}
    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .section-label{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase;margin-bottom:10px;margin-top:6px;}
  </style>
</head>
<body>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<div class="auth-container">
  <div class="auth-logo">
    <div class="logo-icon">🩸</div>
    <div class="logo-name">Life<span>Link</span></div>
    <div class="logo-sub">Join the network. Save lives.</div>
  </div>

  <div class="auth-card">
    <h2>Create your account</h2>
    <p class="sub">Set up your LifeLink profile in under a minute</p>

    <div class="error-msg" id="err-msg"></div>

    <form id="reg-form" onsubmit="handleRegister(event)">
      <!-- Role -->
      <div class="section-label">I am a...</div>
      <div class="role-selector">
        <div>
          <input type="radio" name="role" value="DONOR" id="role-donor" class="role-option" checked/>
          <label for="role-donor" class="role-label"><span class="role-icon">🩸</span>Donor</label>
        </div>
        <div>
          <input type="radio" name="role" value="PATIENT" id="role-patient" class="role-option"/>
          <label for="role-patient" class="role-label"><span class="role-icon">🏥</span>Patient</label>
        </div>
        <div>
          <input type="radio" name="role" value="HOSPITAL" id="role-hospital" class="role-option"/>
          <label for="role-hospital" class="role-label"><span class="role-icon">🏨</span>Hospital</label>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <div class="input-wrap">
            <i class="fa fa-user"></i>
            <input type="text" id="fullName" placeholder="Your full name" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <div class="input-wrap">
            <i class="fa fa-phone"></i>
            <input type="tel" id="phone" placeholder="+91 9999999999"/>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Email Address *</label>
        <div class="input-wrap">
          <i class="fa fa-envelope"></i>
          <input type="email" id="email" placeholder="you@example.com" required/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Password *</label>
          <div class="input-wrap">
            <i class="fa fa-lock"></i>
            <input type="password" id="password" placeholder="Min 6 characters" required minlength="6"/>
          </div>
        </div>
        <div class="form-group">
          <label>Blood Type</label>
          <div class="input-wrap">
            <i class="fa fa-droplet"></i>
            <select id="bloodType">
              <option value="">Select</option>
              <option value="A_POSITIVE">A+</option>
              <option value="A_NEGATIVE">A-</option>
              <option value="B_POSITIVE">B+</option>
              <option value="B_NEGATIVE">B-</option>
              <option value="AB_POSITIVE">AB+</option>
              <option value="AB_NEGATIVE">AB-</option>
              <option value="O_POSITIVE">O+</option>
              <option value="O_NEGATIVE">O-</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>City</label>
        <div class="input-wrap">
          <i class="fa fa-city"></i>
          <input type="text" id="city" placeholder="e.g. Mumbai"/>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="reg-btn">
        <i class="fa fa-heart"></i> Create Account
      </button>
    </form>

    <div class="auth-switch">
      Already have an account? <a href="/login/">Sign in</a>
    </div>
    <div class="auth-switch" style="margin-top:8px;">
      <a href="/" style="color:var(--text-muted);font-weight:400;"><i class="fa fa-arrow-left"></i> Back to home</a>
    </div>
  </div>
</div>

<script>
  // Prefill role from URL
  const urlParams = new URLSearchParams(window.location.search);
  const roleParam = urlParams.get('role');
  if (roleParam) {
    const el = document.getElementById(`role-${roleParam.toLowerCase()}`);
    if (el) el.checked = true;
  }

  let userLat = null, userLng = null;
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
    });
  }

  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('reg-btn');
    const err = document.getElementById('err-msg');
    err.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Creating account...';

    const selectedRole = document.querySelector('input[name="role"]:checked')?.value || 'DONOR';

    const payload = {
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
      fullName: document.getElementById('fullName').value,
      phone: document.getElementById('phone').value,
      bloodType: document.getElementById('bloodType').value || null,
      city: document.getElementById('city').value,
      role: selectedRole,
      latitude: userLat,
      longitude: userLng,
    };

    try {
      const res = await fetch('/api/auth/register/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (res.ok && data.token) {
        window.location.href = '/dashboard/';
      } else {
        err.textContent = data.error || 'Registration failed. Please try again.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="fa fa-heart"></i> Create Account';
      }
    } catch {
      err.textContent = 'Cannot connect to server. Make sure the backend is running.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<i class="fa fa-heart"></i> Create Account';
    }
  }
</script>
</body>
</html>
