{% extends "base.html" %}
{% block title %}Find Donors — LifeLink{% endblock %}
{% block page_title %}Find Donors{% endblock %}

{% block content %}
<style>
  .donor-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 24px;
    transition: all 0.3s; position: relative; overflow: hidden;
    display: flex; flex-direction: column; gap: 16px;
  }
  .donor-card:hover { transform: translateY(-3px); border-color: rgba(220,20,60,0.35); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .donor-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--crimson),transparent); opacity:0; transition:opacity 0.3s; }
  .donor-card:hover::before { opacity:1; }

  .dc-top { display:flex; align-items:center; gap:14px; }
  .dc-avatar {
    width:56px; height:56px; border-radius:16px;
    background: linear-gradient(135deg, var(--crimson), #7B00FF);
    display:flex; align-items:center; justify-content:center;
    font-family:'Syne',sans-serif; font-size:22px; font-weight:800;
    color:#fff; flex-shrink:0; position:relative;
  }
  .dc-avail-dot {
    position:absolute; bottom:-2px; right:-2px;
    width:14px; height:14px; border-radius:50%;
    border:2px solid var(--surface);
  }
  .dc-avail-dot.yes { background:var(--green); box-shadow:0 0 6px var(--green); }
  .dc-avail-dot.no  { background:var(--text-muted); }

  .dc-name { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; margin-bottom:3px; }
  .dc-city { font-size:12px; color:var(--text-muted); }
  .dc-badge-row { display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-top:4px; }

  .dc-stats {
    display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
    background: var(--surface-2); border-radius:10px; padding:12px;
  }
  .dc-stat { text-align:center; }
  .dc-stat-val { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; color:var(--crimson-l); }
  .dc-stat-lbl { font-size:10px; color:var(--text-muted); margin-top:2px; }

  .dc-actions { display:flex; gap:8px; }

  /* Star rating */
  .stars { display:flex; gap:2px; }
  .star { font-size:13px; cursor:pointer; transition:transform 0.1s; }
  .star:hover { transform:scale(1.2); }
  .star.filled { color:var(--gold); }
  .star.empty  { color:var(--surface-3); }

  /* Filter bar */
  .filter-bar {
    display:flex; gap:12px; align-items:center; flex-wrap:wrap;
    margin-bottom:24px; padding:16px 20px;
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
  }
  .filter-bar label { font-size:12px; color:var(--text-muted); font-weight:600; white-space:nowrap; }

  .donors-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; }

  /* Modal rating */
  #rate-modal .star { font-size:28px; }
</style>

<!-- Filter Bar -->
<div class="filter-bar">
  <label>Blood Type</label>
  <select id="f-blood" class="input" style="width:110px;" onchange="loadDonors()">
    <option value="">All</option>
    <option value="A_POSITIVE">A+</option><option value="A_NEGATIVE">A-</option>
    <option value="B_POSITIVE">B+</option><option value="B_NEGATIVE">B-</option>
    <option value="AB_POSITIVE">AB+</option><option value="AB_NEGATIVE">AB-</option>
    <option value="O_POSITIVE">O+</option><option value="O_NEGATIVE">O-</option>
  </select>

  <label>Radius</label>
  <select id="f-radius" class="input" style="width:110px;" onchange="loadDonors()">
    <option value="10">10 km</option>
    <option value="25">25 km</option>
    <option value="50" selected>50 km</option>
    <option value="100">100 km</option>
    <option value="500">500 km</option>
  </select>

  <label>Availability</label>
  <select id="f-avail" class="input" style="width:130px;" onchange="loadDonors()">
    <option value="">All</option>
    <option value="true">Available</option>
    <option value="false">Unavailable</option>
  </select>

  <label>Sort</label>
  <select id="f-sort" class="input" style="width:140px;" onchange="loadDonors()">
    <option value="distance">Nearest first</option>
    <option value="rating">Highest rated</option>
    <option value="donations">Most donations</option>
  </select>

  <input type="text" id="f-search" class="input" style="flex:1;min-width:180px;"
    placeholder="🔍 Search by name or city..." oninput="loadDonors()"/>

  <button class="btn btn-secondary btn-sm" onclick="resetFilters()">
    <i class="fa fa-rotate-left"></i> Reset
  </button>
</div>

<!-- Donors Grid -->
<div id="donors-grid" class="donors-grid">
  <div style="grid-column:1/-1;text-align:center;padding:60px;">
    <div class="spinner" style="margin:0 auto;"></div>
  </div>
</div>

<!-- Rate Modal -->
<div class="modal" id="rate-modal">
  <div class="overlay" onclick="closeModal('rate-modal')" style="position:fixed;inset:0;z-index:-1;"></div>
  <div class="modal-box" style="max-width:380px;">
    <div class="modal-header">
      <span class="modal-title">⭐ Rate Donor</span>
      <button class="close-btn" onclick="closeModal('rate-modal')"><i class="fa fa-xmark"></i></button>
    </div>
    <div class="modal-body" style="text-align:center;">
      <p style="color:var(--text-muted);margin-bottom:20px;font-size:14px;">How was your experience with <strong id="rate-name">this donor</strong>?</p>
      <div class="stars" style="justify-content:center;gap:8px;" id="rate-stars">
        <span class="star empty" onclick="setRating(1)">★</span>
        <span class="star empty" onclick="setRating(2)">★</span>
        <span class="star empty" onclick="setRating(3)">★</span>
        <span class="star empty" onclick="setRating(4)">★</span>
        <span class="star empty" onclick="setRating(5)">★</span>
      </div>
      <p id="rate-label" style="margin-top:12px;color:var(--text-muted);font-size:13px;">Select a rating</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('rate-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitRating()">Submit Rating</button>
    </div>
  </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
  const BT_LABEL = {A_POSITIVE:'A+',A_NEGATIVE:'A-',B_POSITIVE:'B+',B_NEGATIVE:'B-',AB_POSITIVE:'AB+',AB_NEGATIVE:'AB-',O_POSITIVE:'O+',O_NEGATIVE:'O-'};

  let selectedRating = 0, ratingUserId = null;

  async function loadDonors() {
    const grid = document.getElementById('donors-grid');
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;"><div class="spinner" style="margin:0 auto;"></div></div>';

    const bt      = document.getElementById('f-blood').value;
    const radius  = document.getElementById('f-radius').value;
    const avail   = document.getElementById('f-avail').value;
    const sort    = document.getElementById('f-sort').value;
    const search  = document.getElementById('f-search').value.toLowerCase();

    let url = 'users/donors';
    const params = [];
    if (bt) params.push(`bloodType=${bt}`);
    if (currentLat && currentLng) {
      params.push(`lat=${currentLat}`, `lng=${currentLng}`, `radius=${radius}`);
    }
    if (params.length) url += '?' + params.join('&');

    try {
      let donors = await api(url);

      if (avail === 'true')  donors = donors.filter(d => d.isAvailable);
      if (avail === 'false') donors = donors.filter(d => !d.isAvailable);
      if (search) donors = donors.filter(d =>
        d.fullName?.toLowerCase().includes(search) ||
        d.city?.toLowerCase().includes(search)
      );

      if (sort === 'rating')    donors.sort((a,b) => (b.rating||0) - (a.rating||0));
      if (sort === 'donations') donors.sort((a,b) => (b.totalDonations||0) - (a.totalDonations||0));

      if (!donors.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><i class="fa fa-user-slash"></i><h3>No donors found</h3><p>Try adjusting the filters or expanding the radius.</p></div>';
        return;
      }

      grid.innerHTML = donors.map(d => renderDonorCard(d)).join('');
    } catch {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><i class="fa fa-exclamation-circle"></i><h3>Error</h3><p>Could not load donors. Ensure backend is running.</p></div>';
    }
  }

  function renderDonorCard(d) {
    const avail = d.isAvailable;
    const btLabel = BT_LABEL[d.bloodType] || '?';
    const stars = renderStars(d.rating);
    const nextDate = d.nextEligibleDate
      ? new Date(d.nextEligibleDate).toLocaleDateString()
      : 'Ready now';
    const isMe = currentUser && d.id === currentUser.id;

    return `
    <div class="donor-card" id="dc-${d.id}">
      <div class="dc-top">
        <div class="dc-avatar">
          ${d.fullName ? d.fullName[0].toUpperCase() : '?'}
          <div class="dc-avail-dot ${avail ? 'yes' : 'no'}"></div>
        </div>
        <div style="flex:1;overflow:hidden;">
          <div class="dc-name">${d.fullName || 'Anonymous'}${isMe ? ' <span style="font-size:10px;color:var(--crimson-l);">(You)</span>' : ''}</div>
          <div class="dc-city"><i class="fa fa-location-dot" style="color:var(--crimson);font-size:11px;margin-right:4px;"></i>${d.city || 'Unknown city'}</div>
          <div class="dc-badge-row">
            <span class="blood-badge ${bloodTypeClass(d.bloodType)}">${btLabel}</span>
            <span class="blood-badge ${avail ? 'blood-O' : ''}" style="${avail ? '' : 'background:rgba(136,136,136,0.1);color:var(--text-muted);border-color:rgba(136,136,136,0.2);'}">
              ${avail ? '✅ Available' : '❌ Unavailable'}
            </span>
          </div>
        </div>
      </div>

      <div class="dc-stats">
        <div class="dc-stat">
          <div class="dc-stat-val">${d.totalDonations || 0}</div>
          <div class="dc-stat-lbl">Donations</div>
        </div>
        <div class="dc-stat">
          <div class="dc-stat-val" style="color:var(--gold);">${d.rating ? parseFloat(d.rating).toFixed(1) : '—'}</div>
          <div class="dc-stat-lbl">Rating</div>
        </div>
        <div class="dc-stat">
          <div class="dc-stat-val" style="font-size:12px;color:var(--green);">${nextDate}</div>
          <div class="dc-stat-lbl">Next eligible</div>
        </div>
      </div>

      ${d.bio ? `<div style="font-size:12px;color:var(--text-muted);padding:10px;background:var(--surface-2);border-radius:8px;">"${d.bio}"</div>` : ''}

      <div style="display:flex;align-items:center;gap:6px;">
        ${stars}
        <span style="font-size:11px;color:var(--text-muted);">(${d.ratingCount || 0} reviews)</span>
      </div>

      <div class="dc-actions">
        ${!isMe
          ? `<button class="btn btn-primary btn-sm" onclick="messageUser(${d.id},'${d.fullName}')">
               <i class="fa fa-comment"></i> Message
             </button>
             <button class="btn btn-secondary btn-sm" onclick="openRateModal(${d.id},'${d.fullName}')">
               <i class="fa fa-star"></i> Rate
             </button>`
          : `<button class="btn btn-secondary btn-sm" onclick="window.location='/profile/'">
               <i class="fa fa-user"></i> Edit Profile
             </button>`
        }
        <button class="btn btn-ghost btn-sm" onclick="viewOnMap(${d.latitude},${d.longitude})" title="View on map">
          <i class="fa fa-map-location-dot"></i>
        </button>
      </div>
    </div>`;
  }

  function renderStars(rating) {
    if (!rating) return '<span style="font-size:12px;color:var(--text-muted);">No ratings yet</span>';
    const full = Math.round(rating);
    return Array.from({length:5}, (_,i) => `<span class="star ${i < full ? 'filled' : 'empty'}" style="font-size:14px;cursor:default;">★</span>`).join('');
  }

  function messageUser(id, name) {
    window.location = `/messages/?to=${id}&name=${encodeURIComponent(name)}`;
  }

  function viewOnMap(lat, lng) {
    if (!lat || !lng) return toast('No Location', 'This donor has no location set.', 'warning');
    window.location = '/map/';
  }

  function openRateModal(userId, name) {
    ratingUserId = userId;
    selectedRating = 0;
    document.getElementById('rate-name').textContent = name;
    document.querySelectorAll('#rate-stars .star').forEach(s => s.className = 'star empty');
    document.getElementById('rate-label').textContent = 'Select a rating';
    openModal('rate-modal');
  }

  function setRating(val) {
    selectedRating = val;
    const labels = ['', 'Poor 😞', 'Fair 😐', 'Good 👍', 'Great 😊', 'Excellent 🌟'];
    document.getElementById('rate-label').textContent = labels[val];
    document.querySelectorAll('#rate-stars .star').forEach((s, i) => {
      s.className = `star ${i < val ? 'filled' : 'empty'}`;
    });
  }

  async function submitRating() {
    if (!selectedRating || !ratingUserId) return toast('Select Rating', 'Please select a star rating.', 'warning');
    try {
      const res = await api(`users/${ratingUserId}/rate`, 'PATCH', { rating: selectedRating });
      toast('⭐ Rating Submitted!', `New average: ${parseFloat(res.rating).toFixed(1)}`, 'success');
      closeModal('rate-modal');
      loadDonors();
    } catch { toast('Error', 'Could not submit rating', 'error'); }
  }

  function resetFilters() {
    document.getElementById('f-blood').value = '';
    document.getElementById('f-radius').value = '50';
    document.getElementById('f-avail').value = '';
    document.getElementById('f-sort').value = 'distance';
    document.getElementById('f-search').value = '';
    loadDonors();
  }

  loadDonors();
</script>
{% endblock %}
