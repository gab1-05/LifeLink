{% extends "base.html" %}
{% block title %}Find Donors — LifeLink{% endblock %}
{% block page_title %}Find Donors{% endblock %}

{% block content %}
<style>
  .donor-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;transition:all 0.3s;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:16px;}
  .donor-card:hover{transform:translateY(-3px);border-color:rgba(220,20,60,0.35);box-shadow:0 8px 32px rgba(0,0,0,0.4);}
  .donor-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--crimson),transparent);opacity:0;transition:opacity 0.3s;}
  .donor-card:hover::before{opacity:1;}
  .dc-top{display:flex;align-items:center;gap:14px;}
  .dc-avatar{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--crimson),#7B00FF);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;flex-shrink:0;position:relative;}
  .dc-avail-dot{position:absolute;bottom:-2px;right:-2px;width:14px;height:14px;border-radius:50%;border:2px solid var(--surface);}
  .dc-avail-dot.yes{background:var(--green);box-shadow:0 0 6px var(--green);}
  .dc-avail-dot.no{background:var(--text-muted);}
  .dc-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:3px;}
  .dc-city{font-size:12px;color:var(--text-muted);}
  .dc-badge-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:4px;}
  .dc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:var(--surface-2);border-radius:10px;padding:12px;}
  .dc-stat{text-align:center;}
  .dc-stat-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--crimson-l);}
  .dc-stat-lbl{font-size:10px;color:var(--text-muted);margin-top:2px;}
  .dc-actions{display:flex;gap:8px;}
  .stars{display:flex;gap:2px;}
  .star{font-size:13px;cursor:default;}
  .star.filled{color:var(--gold);}
  .star.empty{color:var(--surface-3,#272727);}
  .filter-bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:24px;padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);}
  .filter-bar label{font-size:12px;color:var(--text-muted);font-weight:600;white-space:nowrap;}
  .donors-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
  #rate-modal .star{font-size:28px;cursor:pointer;}
  #rate-modal .star:hover{transform:scale(1.2);}
</style>

<!-- Filter Bar -->
<div class="filter-bar">
  <label>Blood Type</label>
  <select id="f-blood" class="input" style="width:110px;" onchange="loadDonors()">
    <option value="">All</option>
    <option value="A_POSITIVE">A+</option><option value="A_NEGATIVE">A-</option>
    <option value="B_POSITIVE">B+</option><option value="B_NEGATIVE">B-</option>
    <option value="AB_POSITIVE">AB+</option><option value="AB_NEGATIVE">AB-</option>
    <option value="O_POSITIVE">O+</option><option value="O_NEGATIVE">O-</option>
  </select>

  <label>Radius</label>
  <select id="f-radius" class="input" style="width:110px;" onchange="loadDonors()">
    <option value="10">10 km</option>
    <option value="25">25 km</option>
    <option value="50" selected>50 km</option>
    <option value="100">100 km</option>
    <option value="500">500 km</option>
  </select>

  <label>Availability</label>
  <select id="f-avail" class="input" style="width:130px;" onchange="loadDonors()">
    <option value="">All</option>
    <option value="true">Available</option>
    <option value="false">Unavailable</option>
  </select>

  <label>Sort</label>
  <select id="f-sort" class="input" style="width:140px;" onchange="loadDonors()">
    <option value="distance">Nearest first</option>
    <option value="rating">Highest rated</option>
    <option value="donations">Most donations</option>
  </select>

  <input type="text" id="f-search" class="input" style="flex:1;min-width:180px;"
    placeholder="🔍 Search by name or city..." oninput="debouncedLoad()"/>

  <button class="btn btn-secondary btn-sm" onclick="resetFilters()">
    <i class="fa fa-rotate-left"></i> Reset
  </button>
</div>

<!-- Donors Grid -->
<div id="donors-grid" class="donors-grid">
  <div style="grid-column:1/-1;text-align:center;padding:60px;">
    <div class="spinner" style="margin:0 auto;"></div>
  </div>
</div>

<!-- Rate Modal -->
<div class="modal" id="rate-modal">
  <div class="overlay" onclick="closeModal('rate-modal')" style="position:fixed;inset:0;z-index:-1;"></div>
  <div class="modal-box" style="max-width:380px;">
    <div class="modal-header">
      <span class="modal-title">⭐ Rate Donor</span>
      <button class="close-btn" onclick="closeModal('rate-modal')"><i class="fa fa-xmark"></i></button>
    </div>
    <div class="modal-body" style="text-align:center;">
      <p style="color:var(--text-muted);margin-bottom:20px;font-size:14px;">
        How was your experience with <strong id="rate-name"></strong>?
      </p>
      <div class="stars" style="justify-content:center;gap:8px;" id="rate-stars">
        <span class="star empty" onclick="setRating(1)">★</span>
        <span class="star empty" onclick="setRating(2)">★</span>
        <span class="star empty" onclick="setRating(3)">★</span>
        <span class="star empty" onclick="setRating(4)">★</span>
        <span class="star empty" onclick="setRating(5)">★</span>
      </div>
      <p id="rate-label" style="margin-top:12px;color:var(--text-muted);font-size:13px;">Select a rating</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('rate-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitRating()">Submit Rating</button>
    </div>
  </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
  let selectedRating = 0, ratingUserId = null;

  /* ── Debounced search (350 ms) ── */
  const debouncedLoad = debounce(loadDonors, 350);

  /* ── Load donors — all filters sent server-side ── */
  async function loadDonors() {
    const grid = document.getElementById('donors-grid');
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;"><div class="spinner" style="margin:0 auto;"></div></div>';

    const params = new URLSearchParams();
    const bt     = document.getElementById('f-blood').value;
    const radius = document.getElementById('f-radius').value;
    const avail  = document.getElementById('f-avail').value;
    const sort   = document.getElementById('f-sort').value;
    const search = document.getElementById('f-search').value.trim();

    if (bt)     params.set('bloodType', bt);
    if (avail)  params.set('isAvailable', avail);
    if (sort)   params.set('sortBy', sort);
    if (search) params.set('q', search);
    if (currentLat && currentLng) {
      params.set('lat', currentLat);
      params.set('lng', currentLng);
      params.set('radius', radius);
    }

    try {
      const donors = await api('users/donors?' + params.toString());

      if (!donors.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><i class="fa fa-user-slash"></i><h3>No donors found</h3><p>Try adjusting the filters or expanding the radius.</p></div>';
        return;
      }

      grid.innerHTML = '';
      donors.forEach(d => {
        const card = buildDonorCard(d);
        grid.appendChild(card);
      });
    } catch(err) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><i class="fa fa-exclamation-circle"></i><h3>Error</h3><p>' + esc(err.message) + '</p></div>';
    }
  }

  /* ── Build donor card as DOM (no innerHTML with user data) ── */
  function buildDonorCard(d) {
    const avail = d.isAvailable;
    const btLabel = BT_LABEL[d.bloodType] || '?';
    const isMe = currentUser && d.id === currentUser.id;

    const card = document.createElement('div');
    card.className = 'donor-card';
    // Store data on element — avoids inline handlers with unsafe strings
    card.dataset.id   = d.id;
    card.dataset.name = d.fullName || 'Anonymous';

    // Avatar
    const top = document.createElement('div');
    top.className = 'dc-top';

    const avatar = document.createElement('div');
    avatar.className = 'dc-avatar';
    avatar.textContent = d.fullName ? d.fullName[0].toUpperCase() : '?';

    const dot = document.createElement('div');
    dot.className = 'dc-avail-dot ' + (avail ? 'yes' : 'no');
    avatar.appendChild(dot);

    const info = document.createElement('div');
    info.style.cssText = 'flex:1;overflow:hidden;';

    const nameEl = document.createElement('div');
    nameEl.className = 'dc-name';
    nameEl.textContent = d.fullName || 'Anonymous';
    if (isMe) {
      const tag = document.createElement('span');
      tag.style.cssText = 'font-size:10px;color:var(--crimson-l);';
      tag.textContent = ' (You)';
      nameEl.appendChild(tag);
    }

    const cityEl = document.createElement('div');
    cityEl.className = 'dc-city';
    cityEl.innerHTML = '<i class="fa fa-location-dot" style="color:var(--crimson);font-size:11px;margin-right:4px;"></i>';
    cityEl.append(d.city || 'Unknown city');

    const badgeRow = document.createElement('div');
    badgeRow.className = 'dc-badge-row';

    const btBadge = document.createElement('span');
    btBadge.className = 'blood-badge ' + bloodTypeClass(d.bloodType);
    btBadge.textContent = btLabel;

    const availBadge = document.createElement('span');
    availBadge.className = 'blood-badge' + (avail ? ' blood-O' : '');
    availBadge.style.cssText = avail ? '' : 'background:rgba(136,136,136,0.1);color:var(--text-muted);border-color:rgba(136,136,136,0.2);';
    availBadge.textContent = avail ? '✅ Available' : '❌ Unavailable';

    badgeRow.append(btBadge, availBadge);
    info.append(nameEl, cityEl, badgeRow);
    top.append(avatar, info);

    // Stats
    const stats = document.createElement('div');
    stats.className = 'dc-stats';
    const nextDate = d.nextEligibleDate ? new Date(d.nextEligibleDate).toLocaleDateString() : 'Ready now';
    stats.innerHTML = `
      <div class="dc-stat"><div class="dc-stat-val">${d.totalDonations || 0}</div><div class="dc-stat-lbl">Donations</div></div>
      <div class="dc-stat"><div class="dc-stat-val" style="color:var(--gold);">${d.rating ? parseFloat(d.rating).toFixed(1) : '—'}</div><div class="dc-stat-lbl">Rating</div></div>
      <div class="dc-stat"><div class="dc-stat-val" style="font-size:12px;color:var(--green);">${esc(nextDate)}</div><div class="dc-stat-lbl">Next eligible</div></div>
    `;

    // Stars
    const starRow = document.createElement('div');
    starRow.style.cssText = 'display:flex;align-items:center;gap:6px;';
    if (d.rating) {
      const full = Math.round(d.rating);
      const starsEl = document.createElement('div');
      starsEl.className = 'stars';
      for (let i = 0; i < 5; i++) {
        const s = document.createElement('span');
        s.className = 'star ' + (i < full ? 'filled' : 'empty');
        s.textContent = '★';
        starsEl.appendChild(s);
      }
      const cnt = document.createElement('span');
      cnt.style.cssText = 'font-size:11px;color:var(--text-muted);';
      cnt.textContent = '(' + (d.ratingCount || 0) + ' reviews)';
      starRow.append(starsEl, cnt);
    } else {
      starRow.textContent = 'No ratings yet';
      starRow.style.fontSize = '12px';
      starRow.style.color = 'var(--text-muted)';
    }

    // Bio
    let bioEl = null;
    if (d.bio) {
      bioEl = document.createElement('div');
      bioEl.style.cssText = 'font-size:12px;color:var(--text-muted);padding:10px;background:var(--surface-2);border-radius:8px;';
      bioEl.textContent = '"' + d.bio + '"';   // textContent — safe
    }

    // Actions
    const actions = document.createElement('div');
    actions.className = 'dc-actions';

    if (!isMe) {
      const msgBtn = document.createElement('button');
      msgBtn.className = 'btn btn-primary btn-sm';
      msgBtn.dataset.action = 'message';
      msgBtn.innerHTML = '<i class="fa fa-comment"></i> Message';

      const rateBtn = document.createElement('button');
      rateBtn.className = 'btn btn-secondary btn-sm';
      rateBtn.dataset.action = 'rate';
      rateBtn.innerHTML = '<i class="fa fa-star"></i> Rate';

      actions.append(msgBtn, rateBtn);
    } else {
      const editBtn = document.createElement('button');
      editBtn.className = 'btn btn-secondary btn-sm';
      editBtn.onclick = () => window.location = '/profile/';
      editBtn.innerHTML = '<i class="fa fa-user"></i> Edit Profile';
      actions.appendChild(editBtn);
    }

    const mapBtn = document.createElement('button');
    mapBtn.className = 'btn btn-ghost btn-sm';
    mapBtn.title = 'View on map';
    mapBtn.dataset.action = 'map';
    mapBtn.dataset.lat = d.latitude || '';
    mapBtn.dataset.lng = d.longitude || '';
    mapBtn.innerHTML = '<i class="fa fa-map-location-dot"></i>';
    actions.appendChild(mapBtn);

    card.append(top, stats, starRow);
    if (bioEl) card.appendChild(bioEl);
    card.appendChild(actions);

    return card;
  }

  /* ── Event delegation for donor cards (safe — no inline handlers with user data) ── */
  document.getElementById('donors-grid').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const card = btn.closest('[data-id]');
    if (!card) return;

    const id   = card.dataset.id;
    const name = card.dataset.name;

    if (btn.dataset.action === 'message') {
      window.location = '/messages/?to=' + id + '&name=' + encodeURIComponent(name);
    } else if (btn.dataset.action === 'rate') {
      openRateModal(id, name);
    } else if (btn.dataset.action === 'map') {
      const lat = btn.dataset.lat, lng = btn.dataset.lng;
      if (!lat || !lng) return toast('No Location', 'This donor has no location set.', 'warning');
      window.location = '/map/?lat=' + lat + '&lng=' + lng + '&zoom=15';
    }
  });

  /* ── Rating modal ── */
  function openRateModal(userId, name) {
    ratingUserId = userId;
    selectedRating = 0;
    document.getElementById('rate-name').textContent = name;   // textContent — safe
    document.querySelectorAll('#rate-stars .star').forEach(s => s.className = 'star empty');
    document.getElementById('rate-label').textContent = 'Select a rating';
    openModal('rate-modal');
  }

  function setRating(val) {
    selectedRating = val;
    const labels = ['', 'Poor 😞', 'Fair 😐', 'Good 👍', 'Great 😊', 'Excellent 🌟'];
    document.getElementById('rate-label').textContent = labels[val];
    document.querySelectorAll('#rate-stars .star').forEach((s, i) => {
      s.className = 'star ' + (i < val ? 'filled' : 'empty');
    });
  }

  async function submitRating() {
    if (!selectedRating || !ratingUserId) return toast('Select Rating', 'Please select a star rating.', 'warning');
    try {
      const res = await api('users/' + ratingUserId + '/rate', 'PATCH', { rating: selectedRating });
      toast('⭐ Rating Submitted!', 'New average: ' + parseFloat(res.rating).toFixed(1), 'success');
      closeModal('rate-modal');
      loadDonors();
    } catch(err) {
      toast('Error', err.message || 'Could not submit rating', 'error');
    }
  }

  function resetFilters() {
    document.getElementById('f-blood').value  = '';
    document.getElementById('f-radius').value = '50';
    document.getElementById('f-avail').value  = '';
    document.getElementById('f-sort').value   = 'distance';
    document.getElementById('f-search').value = '';
    loadDonors();
  }

  loadDonors();
</script>
{% endblock %}
