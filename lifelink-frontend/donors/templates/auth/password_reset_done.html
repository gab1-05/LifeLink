{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeLink — Reset Email Sent</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    body{margin:0;font-family:'DM Sans',sans-serif;background:#0D0D0D;color:#F5F5F5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .card{width:100%;max-width:480px;background:#141414;border:1px solid rgba(220,20,60,0.18);border-radius:24px;padding:36px;box-shadow:0 24px 48px rgba(0,0,0,.3);}
    h2{font-family:'Syne',sans-serif;font-size:26px;margin-bottom:8px;}
    p{color:#B3B3B3;line-height:1.7;margin-bottom:24px;}
    .btn{display:inline-block;padding:12px 20px;border-radius:12px;background:#DC143C;color:#fff;text-decoration:none;font-weight:700;}
  </style>
</head>
<body>
  <div class="card">
    <h2>Check your inbox</h2>
    <p>If an account exists with the email provided, a password reset link has been sent. It may take a few minutes to arrive.</p>
    <a href="{% url 'login' %}" class="btn">Return to sign in</a>
  </div>
</body>
</html>
