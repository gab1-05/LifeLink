{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeLink — Create New Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root{--crimson:#DC143C;--crimson-l:#FF3358;--bg:#0D0D0D;--surface:#141414;--surface-2:#1E1E1E;--border:rgba(220,20,60,0.18);--text:#F5F5F5;--text-muted:#888;}
    body{margin:0;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .card{width:100%;max-width:480px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:36px;box-shadow:0 24px 48px rgba(0,0,0,.3);}
    h2{font-family:'Syne',sans-serif;font-size:26px;margin-bottom:4px;}
    p{color:var(--text-muted);margin-top:0;margin-bottom:24px;}
    .form-group{margin-bottom:18px;}
    label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:8px;}
    input{width:100%;padding:14px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;outline:none;}
    .btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--crimson),var(--crimson-l));color:#fff;font-weight:700;cursor:pointer;font-size:15px;}
  </style>
</head>
<body>
  <div class="card">
    <h2>Create new password</h2>
    <p>Enter a strong password to finish resetting your account.</p>
    <form method="post">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <div class="form-group">
        <label for="id_new_password1">New password</label>
        {{ form.new_password1 }}
      </div>
      <div class="form-group">
        <label for="id_new_password2">Confirm password</label>
        {{ form.new_password2 }}
      </div>
      <button type="submit" class="btn">Reset password</button>
    </form>
  </div>
</body>
</html>
