{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LifeLink — Password Recovery</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

  <script>
    document.documentElement.dataset.theme = localStorage.getItem('lifelink-theme') || 'dark';
  </script>

  <style>
    :root {
      --crimson:#DC143C;
      --crimson-l:#FF3358;
      --bg:#0D0D0D;
      --surface:#141414;
      --surface-2:#1E1E1E;
      --border:rgba(220,20,60,0.18);
      --text:#F5F5F5;
      --text-muted:#888;
      --green:#00E676;
    }
    :root[data-theme="light"] {
      --bg:#F7F8FB;
      --surface:#FFFFFF;
      --surface-2:#F0F3F8;
      --border:rgba(150,40,60,0.18);
      --text:#17202A;
      --text-muted:#647083;
      --green:#008A4E;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;}
    .bg-orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;}
    .orb1{width:500px;height:500px;background:var(--crimson);opacity:0.08;top:-150px;left:-100px;}
    .orb2{width:300px;height:300px;background:#7B00FF;opacity:0.07;bottom:50px;right:-50px;}
    .auth-container{width:100%;max-width:500px;position:relative;z-index:1;}
    .auth-logo{text-align:center;margin-bottom:36px;}
    .logo-icon{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--crimson),var(--crimson-l));display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:16px;box-shadow:0 8px 24px rgba(220,20,60,0.4);animation:heartbeat 1.4s ease-in-out infinite;}
    @keyframes heartbeat{0%,100%{transform:scale(1)}14%{transform:scale(1.15)}28%{transform:scale(1)}42%{transform:scale(1.1)}70%{transform:scale(1)}}
    .logo-name{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;}
    .logo-name span{color:var(--crimson);}
    .logo-sub{font-size:14px;color:var(--text-muted);margin-top:4px;}
    .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px;box-shadow:0 16px 48px rgba(0,0,0,0.5);}
    .auth-card h2{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin-bottom:6px;}
    .auth-card .sub{font-size:14px;color:var(--text-muted);margin-bottom:28px;}
    .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
    label{font-size:13px;font-weight:500;color:var(--text-muted);}
    .input-wrap{position:relative;}
    .input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;pointer-events:none;}
    input{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:12px 14px 12px 40px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;}
    input:focus{border-color:var(--crimson);box-shadow:0 0 0 3px rgba(220,20,60,0.1);}
    input::placeholder{color:var(--text-muted);}
    .btn-submit{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--crimson),var(--crimson-l));color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
    .btn-submit:disabled{opacity:0.65;cursor:default;}
    .error-msg,.success-msg{display:none;padding:12px;border-radius:10px;font-size:14px;line-height:1.4;margin-bottom:18px;}
    .error-msg{background:rgba(255,93,93,0.12);color:#FFB3B3;border:1px solid rgba(255,93,93,0.24);}
    .success-msg{background:rgba(41,204,151,0.12);color:#7EF2C6;border:1px solid rgba(41,204,151,0.24);}
    .auth-switch{font-size:14px;color:var(--text-muted);margin-top:12px;text-align:center;}
    .auth-switch a{color:var(--crimson);text-decoration:none;font-weight:600;}
  </style>
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="auth-container">
    <div class="auth-logo">
      <div class="logo-icon">❤</div>
      <div class="logo-name">Life<span>Link</span></div>
      <div class="logo-sub">Recover access with a secure email code.</div>
    </div>

    <div class="auth-card">
      <h2>Password recovery</h2>
      <p class="sub">Enter the email address for your account to receive a secure one-time recovery code.</p>

      <div class="error-msg" id="err-msg"></div>
      <div class="success-msg" id="success-msg"></div>

      <form id="send-otp-form" onsubmit="handleSendOtp(event)">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <i class="fa fa-envelope"></i>
            <input id="email" type="email" placeholder="you@example.com" autocomplete="email" required />
          </div>
        </div>
        <button type="submit" class="btn-submit" id="send-otp-btn">Send Recovery Code</button>
      </form>

      <form id="reset-form" onsubmit="handleResetPassword(event)" style="display:none;">
        <div class="form-group">
          <label for="otp">Recovery code</label>
          <div class="input-wrap">
            <i class="fa fa-key"></i>
            <input id="otp" type="text" placeholder="6-digit code" inputmode="numeric" maxlength="6" required />
          </div>
        </div>
        <div class="form-group">
          <label for="password">New password</label>
          <div class="input-wrap">
            <i class="fa fa-lock"></i>
            <input id="password" type="password" placeholder="New password" autocomplete="new-password" required />
          </div>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm password</label>
          <div class="input-wrap">
            <i class="fa fa-lock"></i>
            <input id="confirmPassword" type="password" placeholder="Confirm new password" autocomplete="new-password" required />
          </div>
        </div>
        <button type="submit" class="btn-submit" id="reset-btn">Reset password</button>
      </form>

      <div class="auth-switch">
        Remembered your password? <a href="{% url 'login' %}">Sign in instead</a>
      </div>
    </div>
  </div>

  <script>
    function getCsrf() {
      const match = document.cookie.match(/csrftoken=([^;]+)/);
      return match ? match[1] : '';
    }

    function showError(message) {
      const err = document.getElementById('err-msg');
      err.textContent = message;
      err.style.display = 'block';
      document.getElementById('success-msg').style.display = 'none';
    }

    function showSuccess(message) {
      const success = document.getElementById('success-msg');
      success.textContent = message;
      success.style.display = 'block';
      document.getElementById('err-msg').style.display = 'none';
    }

    function setFormState(isSending) {
      document.getElementById('send-otp-btn').disabled = isSending;
      document.getElementById('reset-btn').disabled = isSending;
    }

    async function handleSendOtp(e) {
      e.preventDefault();
      setFormState(true);
      const email = document.getElementById('email').value.trim();
      try {
        const res = await fetch('/api/forgot-password/send-otp/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCsrf(),
          },
          credentials: 'same-origin',
          body: JSON.stringify({ email }),
        });
        const raw = await res.text();
        let data = {};
        try {
          data = raw ? JSON.parse(raw) : {};
        } catch {
          data = { error: 'Unable to send recovery code. Please try again.' };
        }

        if (!res.ok) throw new Error(data.error || 'Unable to send recovery code.');
        showSuccess(data.message || 'Recovery code sent. Check your email.');
        document.getElementById('reset-form').style.display = 'block';
      } catch (error) {
        showError(error.message);
      } finally {
        setFormState(false);
      }
    }

    async function handleResetPassword(e) {
      e.preventDefault();
      setFormState(true);
      const email = document.getElementById('email').value.trim();
      const otp = document.getElementById('otp').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      try {
        const res = await fetch('/api/forgot-password/reset/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCsrf(),
          },
          credentials: 'same-origin',
          body: JSON.stringify({ email, otp, password, confirmPassword }),
        });
        const raw = await res.text();
        let data = {};
        try {
          data = raw ? JSON.parse(raw) : {};
        } catch {
          data = { error: 'Unable to reset password. Please try again.' };
        }

        if (!res.ok) throw new Error(data.error || 'Unable to reset password.');
        showSuccess(data.message || 'Password reset successful.');
        document.getElementById('send-otp-form').reset();
        document.getElementById('reset-form').reset();
        document.getElementById('reset-form').style.display = 'none';
      } catch (error) {
        showError(error.message);
      } finally {
        setFormState(false);
      }
    }
  </script>
</body>
</html>
