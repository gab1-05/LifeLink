{% extends "base.html" %}
{% block title %}Blood Requests — LifeLink{% endblock %}
{% block page_title %}Blood Requests{% endblock %}

{% block content %}
<style>
  .req-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px 24px;transition:all 0.3s;position:relative;overflow:hidden;}
  .req-card:hover{border-color:rgba(220,20,60,0.35);transform:translateY(-2px);}
  .req-card.CRITICAL{border-left:3px solid var(--crimson);}
  .req-card.URGENT{border-left:3px solid var(--gold);}
  .req-card.NORMAL{border-left:3px solid var(--green);}
  .req-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .req-blood{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:16px;font-weight:800;flex-shrink:0;}
  .req-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
  .req-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
  .req-details{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
  .req-detail{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);}
  .req-detail i{width:14px;color:var(--crimson);font-size:12px;}
  .req-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .req-card.is-updating{opacity:.62;pointer-events:none;}
  .req-action-note{font-size:12px;color:var(--text-muted);padding:8px 0;}
  .req-status-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:11px;font-weight:700;border:1px solid var(--border);white-space:nowrap;}
  .req-status-pill.OPEN{color:var(--green);background:rgba(0,230,118,0.10);border-color:rgba(0,230,118,0.24);}
  .req-status-pill.MATCHED{color:var(--gold);background:rgba(255,183,0,0.10);border-color:rgba(255,183,0,0.24);}
  .req-status-pill.FULFILLED{color:var(--green);background:rgba(0,230,118,0.10);border-color:rgba(0,230,118,0.24);}
  .req-status-pill.CANCELLED{color:var(--text-muted);background:var(--soft-bg);border-color:var(--soft-border);}
  .btn-danger{background:rgba(220,20,60,0.10);color:var(--crimson-l);border:1px solid rgba(220,20,60,0.28);}
  .btn-danger:hover{background:rgba(220,20,60,0.18);color:var(--crimson-l);}
  .btn:disabled{opacity:.55;cursor:not-allowed;transform:none !important;}
  .confirm-copy{font-size:14px;color:var(--text-muted);line-height:1.6;}
  .confirm-summary{margin-top:14px;padding:12px 14px;border-radius:12px;background:var(--surface-2);border:1px solid var(--border);}
  .confirm-summary strong{display:block;color:var(--text);font-size:13px;margin-bottom:4px;}
  .tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;width:fit-content;}
  .tab{padding:8px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-muted);transition:all 0.2s;border:none;background:none;}
  .tab.active{background:var(--crimson);color:#fff;box-shadow:0 2px 8px rgba(220,20,60,0.4);}
  .req-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;}
  .time-badge{position:absolute;top:16px;right:16px;font-size:10px;color:var(--text-muted);}
</style>

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('all', this)">🩸 All Open</button>
    <button class="tab" onclick="switchTab('mine', this)">👤 My Requests</button>
    <button class="tab" onclick="switchTab('nearby', this)">📍 Nearby</button>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <select id="filter-urgency" class="input" style="width:150px;" onchange="loadRequests()">
      <option value="">All urgency</option>
      <option value="CRITICAL">🚨 Critical</option>
      <option value="URGENT">⚡ Urgent</option>
      <option value="NORMAL">✅ Normal</option>
    </select>
    <button class="btn btn-primary btn-sm" onclick="openModal('request-modal')">
      <i class="fa fa-plus"></i> New Request
    </button>
  </div>
</div>

<div id="req-grid" class="req-grid">
  <div style="grid-column:1/-1;text-align:center;padding:60px;"><div class="spinner" style="margin:0 auto;"></div></div>
</div>

<div class="modal" id="request-action-modal">
  <div class="overlay" onclick="closeRequestActionModal()" style="position:fixed;inset:0;z-index:-1;"></div>
  <div class="modal-box" style="max-width:460px;">
    <div class="modal-header">
      <div class="modal-title" id="request-action-title">Confirm action</div>
      <button class="close-btn" type="button" onclick="closeRequestActionModal()"><i class="fa fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="confirm-copy" id="request-action-copy"></div>
      <div class="confirm-summary">
        <strong id="request-action-hospital">Request</strong>
        <span id="request-action-meta" style="font-size:12px;color:var(--text-muted);"></span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" type="button" onclick="closeRequestActionModal()">Cancel</button>
      <button class="btn btn-primary" type="button" id="request-action-confirm" onclick="confirmRequestAction()">Confirm</button>
    </div>
  </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
  let activeTab = 'all';
  let requestAction = null;

  function switchTab(tab, btn) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadRequests();
  }

  const BT_LABEL = {A_POSITIVE:'A+',A_NEGATIVE:'A-',B_POSITIVE:'B+',B_NEGATIVE:'B-',AB_POSITIVE:'AB+',AB_NEGATIVE:'AB-',O_POSITIVE:'O+',O_NEGATIVE:'O-'};
  const BT_COLOR = {A_POSITIVE:'rgba(41,121,255,0.2)',A_NEGATIVE:'rgba(41,121,255,0.2)',B_POSITIVE:'rgba(170,0,255,0.2)',B_NEGATIVE:'rgba(170,0,255,0.2)',AB_POSITIVE:'rgba(255,183,0,0.2)',AB_NEGATIVE:'rgba(255,183,0,0.2)',O_POSITIVE:'rgba(220,20,60,0.2)',O_NEGATIVE:'rgba(220,20,60,0.2)'};

  async function loadRequests() {
    const grid = document.getElementById('req-grid');
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;"><div class="spinner" style="margin:0 auto;"></div></div>';

    try {
      let data;
      if (activeTab === 'mine') {
        data = await api('requests/my');
      } else if (activeTab === 'nearby' && currentLat && currentLng) {
        const bt = currentUser?.bloodType || '';
        data = await api(`requests?lat=${currentLat}&lng=${currentLng}&radius=50&bloodType=${bt}`);
      } else {
        data = await api('requests');
      }

      const urgFilter = document.getElementById('filter-urgency').value;
      if (urgFilter) data = data.filter(r => r.urgency === urgFilter);

      if (!data.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><i class="fa fa-droplet"></i><h3>No requests found</h3><p>Try a different filter or post a new request.</p></div>';
        return;
      }

      grid.innerHTML = data.map(r => renderRequestCard(r)).join('');
    } catch {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><i class="fa fa-exclamation-circle"></i><h3>Error</h3><p>Could not load requests. Is the backend running?</p></div>';
    }
  }

  function renderRequestCard(r) {
    const isOwner = Boolean(r.canManage || (currentUser && r.patient && r.patient.id === currentUser.id));
    const btLabel = BT_LABEL[r.bloodType] || r.bloodType || '?';
    const btBg = BT_COLOR[r.bloodType] || 'rgba(136,136,136,0.15)';
    const urgColors = {CRITICAL:'var(--crimson)',URGENT:'var(--gold)',NORMAL:'var(--green)'};
    const uc = urgColors[r.urgency] || '#888';
    const status = r.status || 'OPEN';

    return `
    <div class="req-card ${esc(r.urgency)}" id="req-${r.id}">
      <span class="time-badge">${timeAgo(r.createdAt)}</span>
      <div class="req-top">
        <div class="req-blood" style="background:${btBg};color:${uc};">${btLabel}</div>
        <div>
          <div class="req-title">${esc(r.hospitalName || 'Unknown Hospital')}</div>
          <div class="req-sub">${esc(r.hospitalAddress || 'No address provided')}</div>
        </div>
        <span class="blood-badge urgency-${esc(r.urgency)}" style="margin-left:auto;">${esc(r.urgency)}</span>
      </div>
      <div class="req-details">
        <div class="req-detail"><i class="fa fa-droplet"></i>${r.unitsNeeded || 1} unit(s) needed</div>
        <div class="req-detail"><i class="fa fa-phone"></i>${esc(r.contactPhone || 'No contact')}</div>
        <div class="req-detail"><i class="fa fa-user"></i>${esc(r.patient?.fullName || 'Anonymous')}</div>
        <div class="req-detail"><span class="req-status-pill ${esc(status)}"><i class="fa ${statusIcon(status)}"></i>${statusLabel(status)}</span></div>
      </div>
      ${r.description ? `<div style="font-size:12px;color:var(--text-muted);padding:10px;background:var(--surface-2);border-radius:8px;margin-bottom:14px;">${esc(r.description)}</div>` : ''}
      <div class="req-actions">
        ${isOwner ? renderOwnerActions(r) : renderDonorActions(r)}
        <button class="btn btn-ghost btn-sm" onclick="openOnMap(${r.latitude},${r.longitude})" title="View on map">
          <i class="fa fa-map"></i>
        </button>
      </div>
    </div>`;
  }

  function renderOwnerActions(r) {
    const status = r.status || 'OPEN';
    if (!['OPEN', 'MATCHED'].includes(status)) {
      const note = status === 'FULFILLED' ? 'This request is completed and locked.' : 'This request cannot be changed now.';
      return `<span class="req-action-note"><i class="fa fa-lock"></i> ${note}</span>`;
    }
    const summary = encodeURIComponent(JSON.stringify({
      id: r.id,
      hospitalName: r.hospitalName || 'Unknown Hospital',
      bloodType: BT_LABEL[r.bloodType] || r.bloodType || '?',
      urgency: r.urgency || 'NORMAL',
      status
    }));
    return `
      <button class="btn btn-primary btn-sm" onclick="openRequestAction('fulfill', '${summary}')">
        <i class="fa fa-circle-check"></i> Mark Fulfilled
      </button>
      <button class="btn btn-danger btn-sm" onclick="openRequestAction('delete', '${summary}')">
        <i class="fa fa-trash"></i> Delete
      </button>`;
  }

  function renderDonorActions(r) {
    if (r.status === 'OPEN') {
      const patientName = encodeURIComponent(r.patient?.fullName || '');
      return `<button class="btn btn-primary btn-sm" onclick="respondReq(${r.id})"><i class="fa fa-hand-holding-heart"></i> I'll Donate</button>
              <button class="btn btn-secondary btn-sm" onclick="msgPatient(${r.patient?.id || 'null'}, '${patientName}')"><i class="fa fa-comment"></i> Message</button>`;
    }
    return `<span class="req-action-note"><i class="fa fa-circle-info"></i> ${statusLabel(r.status)}</span>`;
  }

  function statusIcon(status) {
    return { OPEN:'fa-circle-dot', MATCHED:'fa-user-check', FULFILLED:'fa-circle-check', CANCELLED:'fa-ban' }[status] || 'fa-circle';
  }

  function statusLabel(status) {
    return { OPEN:'Open', MATCHED:'Matched', FULFILLED:'Fulfilled', CANCELLED:'Cancelled' }[status] || status || 'Open';
  }

  async function respondReq(id) {
    try {
      const res = await api(`requests/${id}/respond`, 'PATCH');
      toast('🩸 Response Sent!', res.message || 'You responded to this request!', 'success');
      loadRequests();
    } catch { toast('Error', 'Could not respond', 'error'); }
  }

  async function fulfillReq(id) {
    try {
      setRequestBusy(id, true);
      const res = await api(`requests/${id}/fulfill`, 'PATCH');
      toast('Fulfilled', res.message || 'Request marked fulfilled.', 'success');
      loadRequests();
      return true;
    } catch (error) {
      toast('Could not mark fulfilled', error.message || 'Please try again.', 'error');
      setRequestBusy(id, false);
      return false;
    }
  }

  async function cancelReq(id) {
    try {
      setRequestBusy(id, true);
      await api(`requests/${id}/delete`, 'DELETE');
      toast('Request Deleted', 'Your request has been removed.', 'success');
      loadRequests();
      return true;
    } catch (error) {
      toast('Could not delete request', error.message || 'Please try again.', 'error');
      setRequestBusy(id, false);
      return false;
    }
  }

  function openRequestAction(type, encodedSummary) {
    const req = JSON.parse(decodeURIComponent(encodedSummary));
    requestAction = { type, request: req };
    const isFulfill = type === 'fulfill';
    document.getElementById('request-action-title').textContent = isFulfill ? 'Mark request fulfilled?' : 'Delete this request?';
    document.getElementById('request-action-copy').textContent = isFulfill
      ? 'Use this after the blood requirement has been handled. The request will be closed and matched donors will be notified.'
      : 'This removes the request from open lists and maps. This cannot be undone.';
    document.getElementById('request-action-hospital').textContent = req.hospitalName;
    document.getElementById('request-action-meta').textContent = `${req.bloodType} - ${statusLabel(req.status)} - ${req.urgency}`;
    const confirmBtn = document.getElementById('request-action-confirm');
    confirmBtn.className = isFulfill ? 'btn btn-primary' : 'btn btn-danger';
    confirmBtn.innerHTML = isFulfill ? '<i class="fa fa-circle-check"></i> Mark Fulfilled' : '<i class="fa fa-trash"></i> Delete Request';
    openModal('request-action-modal');
  }

  function closeRequestActionModal() {
    requestAction = null;
    closeModal('request-action-modal');
  }

  async function confirmRequestAction() {
    if (!requestAction) return;
    const { type, request } = requestAction;
    const confirmBtn = document.getElementById('request-action-confirm');
    confirmBtn.disabled = true;
    confirmBtn.innerHTML = '<div class="spinner" style="width:16px;height:16px;"></div> Working...';
    try {
      const ok = type === 'fulfill' ? await fulfillReq(request.id) : await cancelReq(request.id);
      if (ok) closeRequestActionModal();
    } finally {
      confirmBtn.disabled = false;
      if (requestAction) {
        confirmBtn.innerHTML = type === 'fulfill' ? '<i class="fa fa-circle-check"></i> Mark Fulfilled' : '<i class="fa fa-trash"></i> Delete Request';
      }
    }
  }

  function setRequestBusy(id, busy) {
    const card = document.getElementById(`req-${id}`);
    if (!card) return;
    card.classList.toggle('is-updating', busy);
    card.querySelectorAll('button').forEach(btn => { btn.disabled = busy; });
  }

  function msgPatient(id, name) {
    if (!id) return toast('Error', 'Cannot message this user', 'error');
    window.location = `/messages/?to=${id}&name=${encodeURIComponent(decodeURIComponent(name || ''))}`;
  }

  function openOnMap(lat, lng) {
    if (!lat || !lng) return toast('No Location', 'This request has no location data.', 'warning');
    window.location = `/map/?lat=${lat}&lng=${lng}&zoom=15`;
  }

  function timeAgo(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr), now = new Date();
    const diff = Math.floor((now-d)/1000);
    if (diff < 60) return 'Just now';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return Math.floor(diff/86400) + 'd ago';
  }

  loadRequests();
  setInterval(loadRequests, 20000);
</script>
{% endblock %}
