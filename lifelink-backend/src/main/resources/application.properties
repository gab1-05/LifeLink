# ============================================================
#  LifeLink Backend — MongoDB Configuration
# ============================================================

spring.application.name=lifelink-backend

# ── MongoDB ──────────────────────────────────────────────────
# Option A: local MongoDB (no auth) — default, works out of the box
spring.data.mongodb.uri=mongodb://localhost:27017/lifelink_db

# Option B: local MongoDB WITH auth — uncomment and edit:
# spring.data.mongodb.uri=mongodb://lifelink_user:LifeLink%40MongoPass@localhost:27017/lifelink_db?authSource=lifelink_db

# Option C: MongoDB Atlas (cloud) — uncomment and paste SRV string:
# spring.data.mongodb.uri=mongodb+srv://<user>:<password>@cluster0.xxxxx.mongodb.net/lifelink_db?retryWrites=true&w=majority

spring.data.mongodb.database=lifelink_db
spring.data.mongodb.auto-index-creation=true

# ── Server ───────────────────────────────────────────────────
server.port=8080

# ── JWT ──────────────────────────────────────────────────────
app.jwt.secret=LifeLinkSuperSecretKeyForJWTMongoDB2024VeryLongSecretKey!!
app.jwt.expiration=86400000

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:8000,http://127.0.0.1:8000

# ── Logging ──────────────────────────────────────────────────
logging.level.com.lifelink=DEBUG
logging.level.org.springframework.data.mongodb=INFO

# ── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
